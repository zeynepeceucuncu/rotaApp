version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: istanbul_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: sifre123
      POSTGRES_DB: rota_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: